<!DOCTYPE html>
<html>
<head>
    <title>Update Status</title>
</head>
<body>
    <h1>Update Status</h1>
    <p>Ticket: {{ ticket.get_id() }}</p>
    <p>Current Status: {{ ticket.get_status() }}</p>
    <form method="POST">
        New Status:
        <select name="status">
            <option>Open</option><option>In Progress</option><option>Resolved</option><option>Closed</option>
        </select><br><br>
        <input type="submit" value="Update">
        <a href="/view_tickets">Cancel</a>
    </form>
</body>
</html>

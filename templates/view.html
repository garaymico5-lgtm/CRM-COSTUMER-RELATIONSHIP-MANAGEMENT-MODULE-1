<!DOCTYPE html>
<html>
<head>
    <title>Customers</title>
</head>
<body>
    <h1>All Customers</h1>
    <table border="1">
        <tr><th>ID</th><th>Name</th><th>Email</th><th>Actions</th></tr>
        {% for c in customers %}
        <tr>
            <td>{{ c.get_id() }}</td>
            <td>{{ c.get_name() }}</td>
            <td>{{ c.get_contact() }}</td>
            <td>
                <a href="/edit/{{ c.get_id() }}">Edit</a>
                <a href="/delete/{{ c.get_id() }}" onclick="return confirm('Delete?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
    <br><a href="/">Back</a>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
</head>
<body>
    <h1>Edit User</h1>
    <p><strong>User ID:</strong> {{ user.get_user_id() }}</p>
    {% if message %}<p style="color:red">{{ message }}</p>{% endif %}
    
    <form method="POST">
        <label>Username:</label>
        <input type="text" name="username" value="{{ user.get_username() }}" required><br><br>
        
        <label>New Password (leave blank to keep current):</label>
        <input type="password" name="password"><br><br>
        
        <label>Role:</label>
        <select name="role" required>
            {% for role in roles %}
                <option value="{{ role }}" {% if user.get_role() == role %}selected{% endif %}>{{ role }}</option>
            {% endfor %}
        </select><br><br>
        
        <input type="submit" value="Update User">
        <a href="/view_users">Cancel</a>
    </form>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Update Interaction</title>
</head>
<body>
    <h1>Update Interaction</h1>
    <p><strong>Interaction ID:</strong> {{ interaction.get_id() }}</p>
    <p><strong>Customer ID:</strong> {{ interaction.get_customer_id() }}</p>
    <p><strong>Type:</strong> {{ interaction.get_type() }}</p>
    <p><strong>Date & Time:</strong> {{ interaction.get_datetime() }}</p>
    
    {% if message %}
        <p style="color: red;">{{ message }}</p>
    {% endif %}
    
    <form method="POST">
        <label>Notes:</label><br>
        <textarea name="notes" rows="5" cols="40" required>{{ interaction.get_notes() }}</textarea><br><br>
        <input type="submit" value="Update Interaction">
        <a href="/view_interactions"><button type="button">Cancel</button></a>
    </form>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Update Priority</title>
</head>
<body>
    <h1>Update Priority</h1>
    <p>Ticket: {{ ticket.get_id() }}</p>
    <p>Current Priority: {{ ticket.get_priority() }}</p>
    <form method="POST">
        New Priority:
        <select name="priority">
            <option>Low</option><option>Medium</option><option>High</option><option>Critical</option>
        </select><br><br>
        <input type="submit" value="Update">
        <a href="/view_tickets">Cancel</a>
    </form>
</body>
</html>

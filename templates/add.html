<h2>Add Customer</h2>

<form method="POST">
    ID: <input name="id" required><br>
    Name: <input name="name" required><br>
    Email: <input type="email" name="contact" required><br>
    <button>Add</button>
</form>

{% if message %}
    {% if "successfully" in message %}
        <p style="color:green;">{{ message }}</p>
    {% else %}
        <p style="color:red;">{{ message }}</p>
    {% endif %}
{% endif %}

<a href="/">Back</a>

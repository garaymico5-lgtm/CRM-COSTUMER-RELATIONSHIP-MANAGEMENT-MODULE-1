<!DOCTYPE html>
<html>
<head>
    <title>Assign Role</title>
</head>
<body>
    <h1>Assign Role to User</h1>
    <p><strong>User:</strong> {{ user.get_username() }} ({{ user.get_user_id() }})</p>
    <p><strong>Current Role:</strong> {{ user.get_role() }}</p>
    {% if message %}<p style="color:red">{{ message }}</p>{% endif %}
    
    <form method="POST">
        <label>New Role:</label>
        <select name="role" required>
            {% for role in roles %}
                <option value="{{ role }}">{{ role }}</option>
            {% endfor %}
        </select><br><br>
        
        <input type="submit" value="Assign Role">
        <a href="/view_users">Cancel</a>
    </form>
</body>
</html>

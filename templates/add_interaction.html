<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Interaction - CRM</title>
</head>
<body>

    <h2>Record Interaction</h2>
    <p>Module 2 — Log a new customer interaction</p>

    {% if message %}
        <div>
            {{ message }}
        </div>
    {% endif %}

    <form method="POST">

        <div>
            <label>Customer ID</label><br>
            <select name="customer_id" required>
                <option value="">-- Select Customer --</option>
                {% for c in customers %}
                    <option value="{{ c.get_id() }}">{{ c.get_id() }} - {{ c.get_name() }}</option>
                {% endfor %}
            </select>
        </div>

        <br>

        <div>
            <label>Interaction Type</label><br>
            <select name="interaction_type" required>
                <option value="">-- Select Type --</option>
                <option value="Call">Call</option>
                <option value="Email">Email</option>
                <option value="Meeting">Meeting</option>
                <option value="Chat">Chat</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <br>

        <div>
            <label>Date & Time</label><br>
            <input type="datetime-local" name="date_time" required>
        </div>

        <br>

        <div>
            <label>Notes</label><br>
            <textarea name="notes" required></textarea>
        </div>

        <br>

        <button type="submit">Save Interaction</button>
    </form>

    <br>
    <a href="{{ url_for('home') }}">Back to Menu</a>

</body>
</html>

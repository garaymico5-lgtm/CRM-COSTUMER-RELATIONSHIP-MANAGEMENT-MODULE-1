<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Interaction - CRM</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        h2 {
            color: #e94560;
            margin-bottom: 8px;
            font-size: 1.6rem;
        }
        .subtitle {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 11px 14px;
            background: #0f3460;
            border: 1px solid #1a4a8a;
            border-radius: 8px;
            color: #eee;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #e94560;
        }
        select option { background: #0f3460; }
        textarea { resize: vertical; min-height: 90px; }
        .btn {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn:hover { background: #c73652; }
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 18px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .message.success { background: #1a4a2e; color: #4caf50; border: 1px solid #4caf50; }
        .message.error { background: #4a1a1a; color: #f44336; border: 1px solid #f44336; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #e94560; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📝 Record Interaction</h2>
        <p class="subtitle">Module 2 — Log a new customer interaction</p>

        {% if message %}
            <div class="message {% if 'Successfully' in message %}success{% else %}error{% endif %}">
                {{ message }}
            </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Customer ID</label>
                <select name="customer_id" required>
                    <option value="">-- Select Customer --</option>
                    {% for c in customers %}
                        <option value="{{ c.get_id() }}">{{ c.get_id() }} - {{ c.get_name() }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Interaction Type</label>
                <select name="interaction_type" required>
                    <option value="">-- Select Type --</option>
                    <option value="Call">Call</option>
                    <option value="Email">Email</option>
                    <option value="Meeting">Meeting</option>
                    <option value="Chat">Chat</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Date & Time</label>
                <input type="datetime-local" name="date_time" required>
            </div>

            <div class="form-group">
                <label>Notes</label>
                <textarea name="notes" placeholder="Enter interaction notes..." required></textarea>
            </div>

            <button type="submit" class="btn">💾 Save Interaction</button>
        </form>

        <a href="{{ url_for('home') }}" class="back-link">← Back to Menu</a>
    </div>
</body>
</html>

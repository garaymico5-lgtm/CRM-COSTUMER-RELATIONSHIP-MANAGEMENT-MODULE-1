<!DOCTYPE html>
<html>
<head>
    <title>Add Interaction</title>
</head>
<body>
    <h1>Add Interaction</h1>
    {% if message %}<p>{{ message }}</p>{% endif %}
    <form method="POST">
        Customer: <select name="customer_id">
            {% for c in customers %}<option value="{{ c.get_id() }}">{{ c.get_id() }} - {{ c.get_name() }}</option>{% endfor %}
        </select><br><br>
        Type: <input type="text" name="interaction_type" required><br><br>
        Date/Time: <input type="datetime-local" name="date_time" required><br><br>
        Notes: <textarea name="notes" required></textarea><br><br>
        <input type="submit" value="Add">
        <a href="/">Cancel</a>
    </form>
</body>
</html>

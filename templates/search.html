<!DOCTYPE html>
<html>
<head>
    <title>Search Customer</title>
</head>
<body>
    <h1>Search Customer</h1>
    <form method="POST">
        Customer ID: <input type="text" name="id" required>
        <input type="submit" value="Search">
    </form>
    {% if customer %}
        <h2>Result:</h2>
        <p>ID: {{ customer.get_id() }}</p>
        <p>Name: {{ customer.get_name() }}</p>
        <p>Email: {{ customer.get_contact() }}</p>
    {% endif %}
    {% if message %}<p>{{ message }}</p>{% endif %}
    <br><a href="/">Back</a>
</body>
</html>
